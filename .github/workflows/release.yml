name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'agoodbug.php'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from plugin file
        id: version
        run: |
          version=$(grep -m1 "define( 'AGOODBUG_VERSION'" agoodbug.php | grep -oP "'[0-9]+\.[0-9]+\.[0-9]+'" | tr -d "'")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build zip
        if: steps.check.outputs.exists == 'false'
        run: |
          zip -r agoodbug-${{ steps.version.outputs.version }}.zip . \
            -x '.git/*' '.github/*' '.claude/*' '*.DS_Store'

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: agoodbug-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
